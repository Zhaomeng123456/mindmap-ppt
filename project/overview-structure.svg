<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#faf8f5"/>
      <stop offset="100%" stop-color="#f3eee6"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bgGrad)"/>
  <!-- central camera module -->
  <rect x="570" y="340" width="140" height="100" rx="8" fill="#eef7f3" stroke="#183a4a" stroke-width="2.5"/>
  <circle cx="640" cy="370" r="22" fill="none" stroke="#183a4a" stroke-width="2"/>
  <circle cx="640" cy="370" r="10" fill="#183a4a" opacity="0.6"/>
  <circle cx="640" cy="370" r="4" fill="#d8894f"/>
  <!-- lens rings -->
  <circle cx="640" cy="370" r="30" fill="none" stroke="#183a4a" stroke-width="1" opacity="0.3"/>
  <!-- 4 branches connecting -->
  <!-- top-left: environmental (sun/heat) -->
  <path d="M570,360 C450,340 380,250 340,200" fill="none" stroke="#183a4a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="340" cy="180" r="45" fill="#eef7f3" stroke="#183a4a" stroke-width="2"/>
  <circle cx="340" cy="180" r="18" fill="#d8894f" opacity="0.5"/>
  <line x1="340" y1="150" x2="340" y2="120" stroke="#d8894f" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="340" y1="210" x2="340" y2="240" stroke="#d8894f" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="310" y1="180" x2="280" y2="180" stroke="#d8894f" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="370" y1="180" x2="400" y2="180" stroke="#d8894f" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- 5 small dots around environmental node -->
  <circle cx="340" cy="150" r="3" fill="#183a4a"/>
  <circle cx="340" cy="210" r="3" fill="#183a4a"/>
  <circle cx="310" cy="180" r="3" fill="#183a4a"/>
  <circle cx="370" cy="180" r="3" fill="#183a4a"/>
  <!-- top-right: stimulation (lightning/spike) -->
  <path d="M710,360 C730,330 770,250 800,200" fill="none" stroke="#183a4a" stroke-width="2" stroke-linecap="round"/>
  <polygon points="800,135 825,185 810,185 815,235 790,185 805,185" fill="#d8894f" opacity="0.7"/>
  <!-- bottom-left: lifetime (clock/hourglass) -->
  <path d="M580,420 C480,460 380,560 340,600" fill="none" stroke="#183a4a" stroke-width="2" stroke-linecap="round"/>
  <rect x="300" y="560" width="80" height="100" rx="10" fill="#eef7f3" stroke="#183a4a" stroke-width="2"/>
  <line x1="340" y1="575" x2="340" y2="585" stroke="#183a4a" stroke-width="2"/>
  <line x1="340" y1="610" x2="340" y2="650" stroke="#183a4a" stroke-width="1.5"/>
  <line x1="340" y1="620" x2="355" y2="630" stroke="#d8894f" stroke-width="1.5" opacity="0.6"/>
  <line x1="340" y1="640" x2="325" y2="650" stroke="#183a4a" stroke-width="1.5"/>
  <!-- bottom-right: screening (funnel/filter) -->
  <path d="M700,420 C740,460 780,560 800,600" fill="none" stroke="#183a4a" stroke-width="2" stroke-linecap="round"/>
  <polygon points="790,560 890,560 860,660 820,660" fill="#eef7f3" stroke="#183a4a" stroke-width="2"/>
  <rect x="810" y="680" width="60" height="30" rx="6" fill="#d8894f" opacity="0.4" stroke="#183a4a" stroke-width="1.5"/>
  <!-- small dots flowing through funnel -->
  <circle cx="830" cy="570" r="3" fill="#183a4a" opacity="0.5"/>
  <circle cx="845" cy="585" r="3" fill="#183a4a" opacity="0.5"/>
  <circle cx="835" cy="600" r="3" fill="#183a4a" opacity="0.4"/>
  <circle cx="838" cy="695" r="3" fill="#d8894f" opacity="0.6"/>
</svg>
